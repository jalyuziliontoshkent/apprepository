# EAS arxivini Linuxda yaratadi — Windows CLI tar (#3532) "Permission denied" xatosidan qochish.
# Sozlash: GitHub → Settings → Secrets → EXPO_TOKEN (https://expo.dev/accounts/[account]/settings/access-tokens)

name: EAS Android preview (APK)

on:
  workflow_dispatch:

jobs:
  build:
    name: Trigger EAS build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: Build on EAS (upload from Linux)
        run: eas build --platform android --profile preview --non-interactive --no-wait
