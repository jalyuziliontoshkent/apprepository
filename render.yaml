# Bitta Git repodan Render da deploy (Blueprint yoki Web Service).
# Maxfiy qiymatlarni Git ga qo‘ymang — Render Dashboard da qo‘shing (sync: false).

services:
  - type: web
    name: lion-blinds-backend
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # 3.14 hali nozik; 3.12 barqaror (https://render.com/docs/python-version)
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_ENV
        value: production
      - key: ACCESS_TOKEN_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_DAYS
        value: "30"
      - key: PASSWORD_HASH_ROUNDS
        value: "12"
      - key: CORS_ORIGINS
        sync: false
      - key: ENABLE_DEMO_SEED_DATA
        value: "false"
